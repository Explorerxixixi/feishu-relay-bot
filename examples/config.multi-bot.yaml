# 多 bot 示例配置 — 一进程同时跑 3 个 bot
#
# 用 case：负载均衡（多账号轮询）/ 多场景（不同 bot 接不同业务）
#
# 启动:
#   export UPSTREAM_API_KEY=sk-xxx
#   export BOT_A_SECRET=xxx
#   export BOT_B_SECRET=yyy
#   export BOT_C_SECRET=zzz
#   feishu-relay-bot run --config examples/config.multi-bot.yaml

upstream:
  base_url: ${UPSTREAM_BASE_URL:-https://memopalace-prod.stepfun-inc.com}
  api_key: ${UPSTREAM_API_KEY}

models:
  - public: claude-opus-4-7
    upstream: claude-opus-4-7
    endpoint: messages
  - public: gpt-5-5
    upstream: gpt-5.5
    endpoint: responses
  - public: kimi-2.6
    upstream: kimi-k2.6
    endpoint: chat

bots:
  # Bot A：用全局 upstream
  - name: zen-aliasA
    app_id: cli_aaaa
    app_secret: ${BOT_A_SECRET}
    enabled: true

  # Bot B：覆盖 upstream 指向测试环境
  - name: zen-aliasB
    app_id: cli_bbbb
    app_secret: ${BOT_B_SECRET}
    enabled: true
    upstream:
      base_url: https://memopalace-test.stepfun-inc.net
      api_key: ${BOT_B_UPSTREAM_KEY}

  # Bot C：暂时禁用
  - name: zen-aliasC
    app_id: cli_cccc
    app_secret: ${BOT_C_SECRET}
    enabled: false

logging:
  level: INFO
  format: json
  file: /var/log/feishu-relay-bot/runtime.log

runtime:
  worker_threads: 64
